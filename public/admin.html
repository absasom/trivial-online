<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      background: #111;
      color: #fff;
    }
    h1 {
      color: #ffcc00;
    }
    button {
      padding: 10px 14px;
      margin: 6px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-show {
      background: #3498db;
      color: white;
    }
    .btn-hide {
      background: #e74c3c;
      color: white;
    }
    .card {
      border: 1px solid #444;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      background: #222;
    }
  </style>
</head>
<body>

<h1>Admin</h1>

<div class="card">
  <h2>Control de juego</h2>
  <button class="btn-show" onclick="mostrarPregunta()">
    Mostrar pregunta
  </button>
  <button class="btn-show" onclick="mostrarRespuesta()">
    Mostrar respuesta
  </button>
  <button class="btn-hide" onclick="ocultarTodo()">
    Ocultar todo
  </button>
</div>

<div class="card">
  <h2>Grupo 1</h2>
  <button class="btn-show" onclick="puntuar(1, 'add')">+1</button>
  <button class="btn-hide" onclick="puntuar(1, 'sub')">-1</button>
</div>

<div class="card">
  <h2>Grupo 2</h2>
  <button class="btn-show" onclick="puntuar(2, 'add')">+1</button>
  <button class="btn-hide" onclick="puntuar(2, 'sub')">-1</button>
</div>

<div class="card">
  <h2>Estado actual</h2>
  <pre id="state">-</pre>
</div>

<script>
async function fetchState() {
  const resp = await fetch('/api/state');
  const s = await resp.json();
  document.getElementById('state').textContent = JSON.stringify(s, null, 2);
}

async function mostrarPregunta() {
  await fetch('/api/show-question', { method: 'POST' });
  fetchState();
}

async function mostrarRespuesta() {
  await fetch('/api/show-answer', { method: 'POST' });
  fetchState();
}

async function ocultarTodo() {
  await fetch('/api/hide', { method: 'POST' });
  fetchState();
}

async function puntuar(group, action) {
  await fetch(`/api/score/${group}/${action}`, { method: 'POST' });
  fetchState();
}

fetchState();
</script>

</body>
</html>
