<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      background: #111;
      color: #fff;
    }
    h1 {
      color: #ffcc00;
    }
    button {
      padding: 10px 14px;
      margin: 6px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-show {
      background: #3498db;
      color: white;
    }
    .btn-hide {
      background: #e74c3c;
      color: white;
    }
    .card {
      border: 1px solid #444;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      background: #222;
    }
  </style>
</head>
<body>

<h1>Admin</h1>

<div class="card">
  <h2>Control de juego</h2>
  <button class="btn-show" onclick="mostrarPregunta()">
    Mostrar pregunta
  </button>
  <button class="btn-show" onclick="mostrarRespuesta()">
    Mostrar respuesta
  </button>
  <button class="btn-hide" onclick="ocultarTodo()">
    Ocultar todo
  </button>
</div>

<div class="card">
  <h2>Grupo 1</h2>
  <button class="btn-show" onclick="sumar(1)">+1</button>
  <button class="btn-hide" onclick="restar(1)">-1</button>
</div>

<div class="card">
  <h2>Grupo 2</h2>
  <button class="btn-show" onclick="sumar(2)">+1</button>
  <button class="btn-hide" onclick="restar(2)">-1</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let estado = {
  showQuestion: false,
  showAnswer:   false,
  question: "¿Qué planeta es conocido como el planeta rojo?",
  answer: "Marte",
  scores: { group1: 0, group2: 0 }
};

function enviar() {
  socket.emit("estado", estado);
}

function mostrarPregunta() {
  estado.showQuestion = true;
  estado.showAnswer   = false;
  enviar();
}

function mostrarRespuesta() {
  estado.showAnswer = true;
  enviar();
}

function ocultarTodo() {
  estado.showQuestion = false;
  estado.showAnswer   = false;
  enviar();
}

function sumar(grupo) {
  const key = grupo === 1 ? "group1" : "group2";
  estado.scores[key] += 1;
  enviar();
}

function restar(grupo) {
  const key = grupo === 1 ? "group1" : "group2";
  estado.scores[key] -= 1;
  enviar();
}
</script>

</body>
</html>
