<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Trivial - Jugador</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 30px;
    }
    h1 {
      color: #ffcc00;
    }
    #pregunta {
      margin: 30px auto;
      font-size: 28px;
      font-weight: bold;
      color: #00ffcc;
      max-width: 800px;
    }
    #respuesta {
      margin: 20px auto;
      font-size: 32px;
      font-weight: bold;
      color: #ffcc00;
      max-width: 800px;
    }
    #marcadores {
      margin-top: 30px;
      font-size: 20px;
      color: #ccc;
    }
  </style>
</head>
<body>

<h1>Trivial</h1>

<!-- Pregunta -->
<div id="pregunta">Esperando al admin...</div>

<!-- Respuesta -->
<div id="respuesta"></div>

<!-- Marcadores de puntos -->
<div id="marcadores">
  Grupo 1: <span id="g1">0</span> puntos | 
  Grupo 2: <span id="g2">0</span> puntos
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const preguntaDiv  = document.getElementById("pregunta");
const respuestaDiv = document.getElementById("respuesta");
const g1Span       = document.getElementById("g1");
const g2Span       = document.getElementById("g2");

socket.on("estado", (data) => {
  // Mostrar pregunta solo si showQuestion es true
  if (data.showQuestion) {
    preguntaDiv.textContent = data.question || "Pregunta vacía";
  } else {
    preguntaDiv.textContent = "Esperando al admin...";
  }

  // Mostrar respuesta solo si showAnswer es true y hay answer
  if (data.showAnswer && data.answer) {
    respuestaDiv.textContent = data.answer;
  } else {
    respuestaDiv.textContent = "";
  }

  // Actualizar puntos
  g1Span.textContent = data.scores?.group1 ?? 0;
  g2Span.textContent = data.scores?.group2 ?? 0;
});
</script>

</body>
</html>
