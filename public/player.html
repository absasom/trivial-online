<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Trivial - Jugador</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #ffcc00;
    }
    #pregunta {
      margin-top: 30px;
      font-size: 28px;
      font-weight: bold;
      color: #00ffcc;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    #respuesta {
      margin-top: 20px;
      font-size: 32px;
      font-weight: bold;
      color: #ffcc00;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    #pista {
      margin: 20px auto;
      font-size: 20px;
      color: #00ffcc;
    }
    #marcadores {
      margin-top: 30px;
      font-size: 20px;
      color: #ccc;
    }
  </style>
</head>
<body>

<h1>🎡 Trivial</h1>

<!-- Pregunta -->
<div id="pregunta">Esperando al admin...</div>

<!-- Respuesta -->
<div id="respuesta"></div>

<!-- Pista -->
<div id="pista"></div>

<!-- Marcadores por grupo (en puntos) -->
<div id="marcadores">
  Grupo 1: <span id="g1">0</span> puntos | 
  Grupo 2: <span id="g2">0</span> puntos
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const preguntaDiv  = document.getElementById("pregunta");
const respuestaDiv = document.getElementById("respuesta");
const pistaDiv     = document.getElementById("pista");
const g1Span       = document.getElementById("g1");
const g2Span       = document.getElementById("g2");

// Escuchar el estado
socket.on("estado", (data) => {
  // Pregunta
  preguntaDiv.textContent = data.showQuestion ? data.question : "Esperando al admin...";

  // Respuesta
  if (data.showAnswer && data.answer) {
    respuestaDiv.textContent = data.answer;
  } else {
    respuestaDiv.textContent = "";
  }

  // Puntos de grupo
  g1Span.textContent = data.scores.group1;
  g2Span.textContent = data.scores.group2;
});

// Escuchar pista
socket.on("pista", (texto) => {
  pistaDiv.textContent = texto;
});
</script>

</body>
</html>
